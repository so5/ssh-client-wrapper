name: Release and Publish

on:
  push:
    branches:
      - main

jobs:
  test:
    uses: ./.github/workflows/run_test.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      # Checkout with an admin PAT (not the default GITHUB_TOKEN) so that
      # @semantic-release/git's push of the version-bump commit is exempt
      # from branch protection's required status checks, the same way a
      # manual admin push is - a fresh direct-pushed commit has no status
      # checks recorded against it yet and would otherwise be rejected
      # with GH006: Protected branch update failed.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
      - run: npm install -g npm@11
      - run: npm ci
      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
